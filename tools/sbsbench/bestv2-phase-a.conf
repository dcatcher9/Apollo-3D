# Apollo Phase-A candidate for reproducing VisionDepth3D offline Bestv2.
#
# This is deliberately separate from bench.conf (Apollo's shipping-intent regression baseline).
# It pins every known depth/shaping choice so defaults cannot silently change the experiment.
# It is a CANDIDATE until the two depth checkpoints pass against VD3D:
#   raw_*.f32     = raw DA-V2 model output
#   depth_*.png   = final normalized/temporal/curved depth immediately before the warp

min_log_level = 2
sbs_3d_warp = apollo
sbs_3d_shift_profile = bestv2
sbs_3d_vd3d_forward_blend = 0.65
sbs_3d_vd3d_fill_radius = 96

# Model and deterministic offline cadence.
sbs_3d_depth_model = depth_anything_v2_fp16
sbs_3d_depth_short_side = 432
sbs_3d_depth_fps = 0

# VD3D render-stage order: raw per-pixel EMA, then percentile normalization.
sbs_3d_ema = 0.5
sbs_3d_ema_pixel_first = enabled
sbs_3d_norm_pct_lo = 2
sbs_3d_norm_pct_hi = 98
sbs_3d_minmax_ema = 0.18

# No Apollo-only normalization or edge-depth additions in Phase A.
sbs_3d_minmax_snap = 0
sbs_3d_range_floor = 0
sbs_3d_guided_upsample = disabled
sbs_3d_depth_floor = 0
sbs_3d_border_fade = 0

# Bestv2 shaping values. These affect the warp input/field, not the raw model checkpoint.
sbs_3d_subject_track = enabled
sbs_3d_subject_lock = 0.95
sbs_3d_subject_recenter = 0.35
sbs_3d_subject_stretch = enabled
sbs_3d_stretch_lo = 0.05
sbs_3d_stretch_hi = 0.95
sbs_3d_subject_plane_lock = 0.28
sbs_3d_subject_plane_width = 0.12
# Curvature is inside VD3D's pixel_shift stage, after the common pre-warp depth checkpoint.
# Keep it off while proving depth parity; each warp implementation applies its own Bestv2 0.07.
sbs_3d_foreground_curvature = 0

# Startup/uninitialized-depth fallback only. Once subject state is initialized, the Bestv2 shift
# profile uses the preset's source-pixel calibration and does not use normalized divergence.
sbs_3d_divergence = 0.00285
sbs_3d_dof_strength = 0
sbs_3d_perf_stats = enabled
