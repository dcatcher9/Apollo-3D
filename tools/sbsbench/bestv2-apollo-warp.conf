# Phase-B quality profile for Apollo's occlusion-aware probe warp.
#
# Starts from the completed Bestv2 depth/shift reproduction, then applies the established
# per-warp quality verdicts. Fidelity-only processors that regress independent quality are off.
# Pending additions (guided upsample, scene-cut snap, range floor) stay off until isolated evals.

min_log_level = 2
sbs_3d_warp = apollo
sbs_3d_shift_profile = bestv2
sbs_3d_vd3d_forward_blend = 0.65
sbs_3d_vd3d_fill_radius = 96

sbs_3d_depth_model = depth_anything_v2_fp16
sbs_3d_depth_short_side = 432
sbs_3d_depth_fps = 0

sbs_3d_ema = 0.5
sbs_3d_ema_pixel_first = enabled
sbs_3d_norm_pct_lo = 2
sbs_3d_norm_pct_hi = 98
sbs_3d_minmax_ema = 0.18

# Apollo-only processors pending Phase-B evaluation.
sbs_3d_minmax_snap = 0
sbs_3d_range_floor = 0
sbs_3d_guided_upsample = disabled
sbs_3d_depth_floor = 0
sbs_3d_border_fade = 0

# Shared Bestv2 field. The old true off/on study and the exact-vs-approximate study both
# disfavor plane lock for quality; off is the initial profile choice, pending final-stack confirm.
sbs_3d_subject_track = enabled
sbs_3d_subject_lock = 0.95
sbs_3d_subject_recenter = 0.35
sbs_3d_subject_stretch = enabled
sbs_3d_stretch_lo = 0.05
sbs_3d_stretch_hi = 0.95
sbs_3d_subject_plane_lock = 0
sbs_3d_subject_plane_width = 0.12

# Rejected or fidelity-only processors.
sbs_3d_foreground_curvature = 0
sbs_3d_bestv2_sharpen = disabled

sbs_3d_divergence = 0.00285
sbs_3d_perf_stats = enabled
