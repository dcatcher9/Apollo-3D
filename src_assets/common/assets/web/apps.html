<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
      <%- header %>
      <style>
        .library-page {
          max-width: 1320px;
          padding-bottom: 5rem;
        }

        .library-header {
          align-items: flex-end;
          display: flex;
          gap: 1.5rem;
          justify-content: space-between;
          margin: 2.25rem 0 1.5rem;
        }

        .library-eyebrow {
          color: var(--bs-primary);
          font-size: .75rem;
          font-weight: 700;
          letter-spacing: .12em;
          margin-bottom: .45rem;
          text-transform: uppercase;
        }

        .library-title {
          font-size: clamp(2rem, 4vw, 3rem);
          font-weight: 700;
          letter-spacing: -.04em;
          line-height: 1;
          margin: 0;
        }

        .library-subtitle {
          color: var(--bs-secondary-color);
          margin: .75rem 0 0;
          max-width: 44rem;
        }

        .library-toolbar {
          align-items: center;
          background: color-mix(in srgb, var(--bs-body-bg) 92%, var(--bs-primary) 8%);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: 1rem;
          display: flex;
          gap: .75rem;
          margin-bottom: 1.5rem;
          padding: .75rem;
          position: sticky;
          top: .75rem;
          z-index: 20;
        }

        .library-search {
          flex: 1;
          min-width: 12rem;
          position: relative;
        }

        .library-search > i {
          color: var(--bs-secondary-color);
          left: .95rem;
          pointer-events: none;
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
        }

        .library-search .form-control {
          background: var(--bs-body-bg);
          border-color: transparent;
          border-radius: .75rem;
          padding-left: 2.65rem;
        }

        .library-search .form-control:focus {
          border-color: var(--bs-primary);
          box-shadow: 0 0 0 .2rem color-mix(in srgb, var(--bs-primary) 20%, transparent);
        }

        .library-count {
          color: var(--bs-secondary-color);
          font-size: .875rem;
          white-space: nowrap;
        }

        .library-grid {
          display: grid;
          gap: 1rem;
          grid-template-columns: repeat(auto-fill, minmax(205px, 1fr));
        }

        .app-card {
          background: var(--bs-tertiary-bg);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: 1rem;
          display: flex;
          flex-direction: column;
          min-width: 0;
          overflow: hidden;
          position: relative;
          transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .app-card:hover {
          border-color: color-mix(in srgb, var(--bs-primary) 45%, var(--bs-border-color));
          box-shadow: 0 .75rem 2rem rgba(0, 0, 0, .12);
          transform: translateY(-2px);
        }

        .app-card.is-active {
          border-color: var(--bs-success);
          box-shadow: 0 0 0 1px var(--bs-success);
        }

        .app-card.dragover {
          border-color: var(--bs-primary);
          box-shadow: 0 0 0 2px var(--bs-primary);
          transform: translateY(-4px) scale(1.01);
        }

        .app-cover {
          align-items: center;
          aspect-ratio: 3 / 4;
          background:
            radial-gradient(circle at 80% 15%, color-mix(in srgb, var(--app-accent) 55%, transparent), transparent 34%),
            linear-gradient(145deg, color-mix(in srgb, var(--app-accent) 28%, #111 72%), #111 68%);
          color: rgba(255, 255, 255, .92);
          display: flex;
          justify-content: center;
          overflow: hidden;
          position: relative;
          user-select: none;
        }

        .app-cover::after {
          background: linear-gradient(to top, rgba(0, 0, 0, .58), transparent 38%);
          bottom: 0;
          content: "";
          inset-inline: 0;
          height: 45%;
          pointer-events: none;
          position: absolute;
        }

        .app-cover-image {
          height: 100%;
          object-fit: cover;
          width: 100%;
        }

        .app-cover-letter {
          font-size: clamp(3.25rem, 8vw, 5.5rem);
          font-weight: 750;
          letter-spacing: -.08em;
          opacity: .92;
          text-shadow: 0 .4rem 1.6rem rgba(0, 0, 0, .28);
        }

        .app-card-badges {
          display: flex;
          flex-wrap: wrap;
          gap: .4rem;
          inset: .75rem .75rem auto;
          position: absolute;
          z-index: 2;
        }

        .app-status-badge {
          align-items: center;
          backdrop-filter: blur(10px);
          background: rgba(12, 16, 19, .75);
          border: 1px solid rgba(255, 255, 255, .12);
          border-radius: 999px;
          color: #fff;
          display: inline-flex;
          font-size: .7rem;
          font-weight: 650;
          gap: .35rem;
          padding: .35rem .55rem;
        }

        .app-status-badge.running i {
          color: var(--bs-success);
        }

        .app-card-grip {
          align-items: center;
          background: rgba(12, 16, 19, .72);
          border: 1px solid rgba(255, 255, 255, .12);
          border-radius: .6rem;
          color: rgba(255, 255, 255, .8);
          cursor: grab;
          display: flex;
          height: 2rem;
          justify-content: center;
          position: absolute;
          right: .75rem;
          top: .75rem;
          width: 2rem;
          z-index: 3;
        }

        .app-card-grip:active {
          cursor: grabbing;
        }

        .app-card-body {
          display: flex;
          flex: 1;
          flex-direction: column;
          gap: .75rem;
          padding: 1rem;
        }

        .app-card-title {
          font-size: 1rem;
          font-weight: 650;
          line-height: 1.3;
          margin: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .app-card-meta {
          color: var(--bs-secondary-color);
          font-size: .78rem;
          min-height: 1.2rem;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .app-actions {
          align-items: stretch;
          display: flex;
          gap: .5rem;
          margin-top: auto;
        }

        .app-actions .btn-primary,
        .app-actions .btn-warning {
          flex: 1;
        }

        .add-app-card {
          align-items: center;
          background: transparent;
          border: 1px dashed color-mix(in srgb, var(--bs-primary) 60%, var(--bs-border-color));
          border-radius: 1rem;
          color: var(--bs-secondary-color);
          display: flex;
          flex-direction: column;
          justify-content: center;
          min-height: 21rem;
          padding: 2rem;
          transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        .add-app-card:hover,
        .add-app-card:focus-visible {
          background: color-mix(in srgb, var(--bs-primary) 8%, transparent);
          border-color: var(--bs-primary);
          color: var(--bs-emphasis-color);
        }

        .add-app-icon {
          align-items: center;
          background: color-mix(in srgb, var(--bs-primary) 14%, transparent);
          border-radius: 999px;
          color: var(--bs-primary);
          display: flex;
          font-size: 1.15rem;
          height: 3.25rem;
          justify-content: center;
          margin-bottom: .9rem;
          width: 3.25rem;
        }

        .library-empty {
          align-items: center;
          border: 1px dashed var(--bs-border-color);
          border-radius: 1rem;
          color: var(--bs-secondary-color);
          display: flex;
          flex-direction: column;
          grid-column: 1 / -1;
          justify-content: center;
          min-height: 20rem;
          padding: 3rem 1.5rem;
          text-align: center;
        }

        .library-drop-tail {
          border: 2px dashed var(--bs-primary);
          border-radius: 1rem;
          color: var(--bs-primary);
          display: grid;
          min-height: 21rem;
          place-content: center;
        }

        .editor-header {
          align-items: center;
          display: flex;
          gap: 1rem;
          justify-content: space-between;
          margin: 2rem 0 1.25rem;
        }

        .editor-title-wrap {
          align-items: center;
          display: flex;
          gap: .85rem;
          min-width: 0;
        }

        .editor-title {
          font-size: clamp(1.65rem, 3vw, 2.25rem);
          font-weight: 700;
          letter-spacing: -.03em;
          margin: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .editor-card {
          background: var(--bs-tertiary-bg);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: 1rem;
          margin-bottom: 1rem;
          overflow: visible;
          padding: clamp(1rem, 3vw, 1.75rem);
        }

        .editor-section-title {
          font-size: 1.1rem;
          font-weight: 650;
          margin-bottom: 1.25rem;
        }

        .editor-cover-preview {
          align-items: center;
          aspect-ratio: 3 / 4;
          background:
            radial-gradient(circle at 80% 15%, color-mix(in srgb, var(--edit-accent) 55%, transparent), transparent 34%),
            linear-gradient(145deg, color-mix(in srgb, var(--edit-accent) 28%, #111 72%), #111 68%);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: .9rem;
          color: #fff;
          display: flex;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        .editor-cover-preview img {
          height: 100%;
          object-fit: cover;
          width: 100%;
        }

        .editor-cover-preview .app-cover-letter {
          font-size: clamp(4rem, 10vw, 7rem);
        }

        .cover-finder {
          max-width: min(42rem, calc(100vw - 2rem));
          min-width: min(38rem, calc(100vw - 2rem));
        }

        .cover-finder .cover-results {
          max-height: 400px;
          overflow-x: hidden;
          overflow-y: auto;
        }

        .cover-finder .cover-results.busy * {
          cursor: wait !important;
          pointer-events: none;
        }

        .cover-container {
          padding-top: 133.33%;
          position: relative;
        }

        .cover-container.result {
          cursor: pointer;
        }

        .cover-container .spinner-border {
          inset: 0;
          margin: auto;
          position: absolute;
        }

        .cover-container img {
          display: block;
          height: 100%;
          object-fit: cover;
          position: absolute;
          top: 0;
          width: 100%;
        }

        .advanced-panel {
          background: var(--bs-tertiary-bg);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: 1rem;
          margin-bottom: 1rem;
          overflow: hidden;
        }

        .advanced-panel > summary {
          align-items: center;
          cursor: pointer;
          display: flex;
          gap: .8rem;
          list-style: none;
          padding: 1.15rem 1.35rem;
          user-select: none;
        }

        .advanced-panel > summary::-webkit-details-marker {
          display: none;
        }

        .advanced-panel > summary::after {
          content: "\f078";
          font-family: "Font Awesome 6 Free";
          font-size: .75rem;
          font-weight: 900;
          margin-left: auto;
          transition: transform 160ms ease;
        }

        .advanced-panel[open] > summary::after {
          transform: rotate(180deg);
        }

        .advanced-summary-icon {
          align-items: center;
          background: color-mix(in srgb, var(--bs-primary) 12%, transparent);
          border-radius: .7rem;
          color: var(--bs-primary);
          display: flex;
          height: 2.4rem;
          justify-content: center;
          width: 2.4rem;
        }

        .advanced-content {
          border-top: 1px solid var(--bs-border-color-translucent);
          padding: clamp(1rem, 3vw, 1.75rem);
        }

        .nested-details {
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: .75rem;
          margin-top: 1.5rem;
        }

        .nested-details > summary {
          cursor: pointer;
          font-weight: 600;
          padding: 1rem;
        }

        .nested-details-content {
          border-top: 1px solid var(--bs-border-color-translucent);
          padding: 1rem;
        }

        .env-table {
          font-size: .86rem;
          margin: 0;
          width: 100%;
        }

        .env-table td {
          border-bottom: 1px solid var(--bs-border-color-translucent);
          padding: .55rem;
          vertical-align: top;
        }

        .editor-actions {
          align-items: center;
          backdrop-filter: blur(14px);
          background: color-mix(in srgb, var(--bs-body-bg) 88%, transparent);
          border: 1px solid var(--bs-border-color-translucent);
          border-radius: 1rem;
          bottom: 1rem;
          box-shadow: 0 .5rem 2rem rgba(0, 0, 0, .15);
          display: flex;
          gap: .65rem;
          justify-content: flex-end;
          margin-top: 1rem;
          padding: .75rem;
          position: sticky;
          z-index: 20;
        }

        .monospace {
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .pre-wrap {
          white-space: pre-wrap;
        }

        @media (max-width: 767.98px) {
          .library-header {
            align-items: stretch;
            flex-direction: column;
            margin-top: 1.5rem;
          }

          .library-header .btn {
            width: 100%;
          }

          .library-toolbar {
            align-items: stretch;
            flex-wrap: wrap;
          }

          .library-search {
            flex-basis: 100%;
          }

          .library-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
          }

          .app-card-body {
            padding: .8rem;
          }

          .app-actions .btn {
            padding-inline: .6rem;
          }

          .add-app-card,
          .library-drop-tail {
            min-height: 16rem;
          }

          .editor-header {
            align-items: flex-start;
          }

          .editor-actions .btn {
            flex: 1;
          }
        }

        @media (max-width: 399.98px) {
          .library-grid {
            grid-template-columns: 1fr;
          }
        }

        @media (prefers-reduced-motion: reduce) {
          .app-card,
          .advanced-panel > summary::after {
            transition: none;
          }
        }
      </style>
</head>

<body id="app" v-cloak>
  <Navbar></Navbar>
  <main id="content" class="container-xl library-page">
    <template v-if="!showEditForm">
      <header class="library-header">
        <div>
          <div class="library-eyebrow">Artemis library</div>
          <h1 class="library-title">{{ $t('apps.applications_title') }}</h1>
          <p class="library-subtitle">
            Choose what appears in Artemis. Launch, stop, and arrange your apps from one place.
          </p>
        </div>
        <button type="button" class="btn btn-primary btn-lg" @click="newApp" :disabled="actionDisabled">
          <i class="fas fa-plus me-2"></i>{{ $t('apps.add_new') }}
        </button>
      </header>

      <section class="library-toolbar" aria-label="Application library controls">
        <label class="library-search">
          <span class="visually-hidden">Search applications</span>
          <i class="fas fa-magnifying-glass"></i>
          <input
            v-model.trim="searchQuery"
            class="form-control"
            type="search"
            placeholder="Search apps"
            autocomplete="off"
          />
        </label>
        <span class="library-count">{{ filteredApps.length }} of {{ apps.length }}</span>
        <button
          type="button"
          class="btn btn-outline-secondary"
          @click="alphabetizeApps"
          :disabled="actionDisabled || !!searchQuery"
          v-if="!listReordered"
        >
          <i class="fas fa-arrow-down-a-z me-1"></i>
          <span class="d-none d-sm-inline">{{ $t('apps.alphabetize') }}</span>
        </button>
        <button
          type="button"
          class="btn btn-warning"
          @click="saveOrder"
          :disabled="actionDisabled"
          v-else
        >
          <i class="fas fa-floppy-disk me-1"></i>{{ $t('apps.save_order') }}
        </button>
      </section>

      <p class="small text-body-secondary mb-3" v-if="!searchQuery && apps.length > 1">
        <i class="fas fa-grip-vertical me-1"></i>Drag cards to change their order in Artemis.
      </p>

      <section class="library-grid" aria-live="polite">
        <article
          v-for="app in filteredApps"
          :key="app.uuid"
          class="app-card"
          :class="{ 'is-active': currentApp === app.uuid, dragover: app.dragover }"
          :style="{ '--app-accent': appAccent(app) }"
          :draggable="!searchQuery && !actionDisabled"
          @dragstart="onDragStart($event, app)"
          @dragenter="onDragEnter($event, app)"
          @dragover="onDragOver($event)"
          @dragleave="onDragLeave(app)"
          @dragend="onDragEnd"
          @drop="onDrop($event, app)"
        >
          <div class="app-cover" @dblclick="exportLauncherFile(app)">
            <img
              v-if="coverPreviewUrl(app)"
              class="app-cover-image"
              :src="coverPreviewUrl(app)"
              :alt="app.name"
            />
            <span class="app-cover-letter" v-else>{{ appInitial(app) }}</span>
            <div class="app-card-badges">
              <span class="app-status-badge running" v-if="currentApp === app.uuid">
                <i class="fas fa-circle fa-2xs"></i>Running
              </span>
              <span class="app-status-badge" v-if="isEnabled(app['virtual-display'])">
                <i class="fas fa-display"></i>Private display
              </span>
            </div>
            <span class="app-card-grip" v-if="!searchQuery" :title="$t('apps.applications_reorder_desc')">
              <i class="fas fa-grip-vertical"></i>
            </span>
          </div>
          <div class="app-card-body">
            <div>
              <h2 class="app-card-title" :title="app.name">{{ app.name || 'Untitled app' }}</h2>
              <div class="app-card-meta" :title="app.cmd">{{ appCommandSummary(app) }}</div>
            </div>
            <div class="app-actions" @dragstart.stop.prevent>
              <button
                type="button"
                class="btn btn-warning"
                :disabled="actionDisabled"
                @click="closeApp"
                v-if="currentApp === app.uuid"
              >
                <i class="fas fa-stop me-1"></i>{{ $t('apps.close') }}
              </button>
              <a
                class="btn btn-primary"
                :class="{ disabled: actionDisabled }"
                :aria-disabled="actionDisabled"
                @click.prevent="launchApp($event, app)"
                :href="'art://launch?host_uuid=' + hostUUID + '&host_name=' + encodeURIComponent(hostName) + '&app_uuid=' + app.uuid + '&app_name=' + encodeURIComponent(app.name)"
                v-else
              >
                <i class="fas fa-play me-1"></i>{{ $t('apps.launch') }}
              </a>
              <button
                type="button"
                class="btn btn-outline-secondary"
                :disabled="actionDisabled"
                @click="editApp(app)"
                :aria-label="$t('apps.edit')"
                :title="$t('apps.edit')"
              >
                <i class="fas fa-pen"></i>
              </button>
              <div class="dropdown">
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  :disabled="actionDisabled"
                  aria-label="More actions"
                >
                  <i class="fas fa-ellipsis"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <button type="button" class="dropdown-item" @click="exportLauncherFile(app)">
                      <i class="fas fa-arrow-up-from-bracket fa-fw me-2"></i>{{ $t('apps.export_launcher_file') }}
                    </button>
                  </li>
                  <li><hr class="dropdown-divider"></li>
                  <li>
                    <button type="button" class="dropdown-item text-danger" @click="showDeleteForm(app)">
                      <i class="fas fa-trash fa-fw me-2"></i>{{ $t('apps.delete') }}
                    </button>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </article>

        <div
          class="library-drop-tail"
          v-if="draggingApp >= 0"
          @dragover="onDragOver"
          @drop="onDropAtEnd"
        >
          <span><i class="fas fa-arrow-down me-2"></i>Move to end</span>
        </div>

        <button
          type="button"
          class="add-app-card"
          @click="newApp"
          :disabled="actionDisabled"
          v-if="!searchQuery"
        >
          <span class="add-app-icon"><i class="fas fa-plus"></i></span>
          <strong>{{ $t('apps.add_new') }}</strong>
          <span class="small mt-1">Add another app to Artemis</span>
        </button>

        <div class="library-empty" v-if="filteredApps.length === 0 && searchQuery">
          <i class="fas fa-magnifying-glass fa-2x mb-3"></i>
          <strong>No applications found</strong>
          <span class="small mt-1">Try a different name or command.</span>
          <button type="button" class="btn btn-link mt-2" @click="searchQuery = ''">Clear search</button>
        </div>
      </section>
    </template>

    <template v-else>
      <header class="editor-header">
        <div class="editor-title-wrap">
          <button
            type="button"
            class="btn btn-outline-secondary rounded-circle"
            @click="closeEditor"
            :aria-label="$t('_common.cancel')"
          >
            <i class="fas fa-arrow-left"></i>
          </button>
          <div class="min-w-0">
            <div class="library-eyebrow mb-1">{{ editForm.uuid ? 'Edit application' : 'New application' }}</div>
            <h1 class="editor-title">{{ editForm.name || 'Untitled app' }}</h1>
          </div>
        </div>
        <button
          type="button"
          class="btn btn-outline-secondary"
          @click="exportLauncherFile(editForm)"
          :disabled="!editForm.uuid"
        >
          <i class="fas fa-arrow-up-from-bracket me-1"></i>
          <span class="d-none d-md-inline">{{ $t('apps.export_launcher_file') }}</span>
        </button>
      </header>

      <form @submit.prevent="save">
        <section class="editor-card">
          <h2 class="editor-section-title">Application details</h2>
          <div class="row g-4">
            <div class="col-8 col-sm-5 col-md-4 col-lg-3 mx-auto mx-md-0">
              <div class="editor-cover-preview" :style="{ '--edit-accent': appAccent(editForm) }">
                <img v-if="editCoverPreview" :src="editCoverPreview" :alt="editForm.name" />
                <span class="app-cover-letter" v-else>{{ appInitial(editForm) }}</span>
              </div>
              <p class="form-text text-center mb-0 mt-2">Artwork shown in Artemis</p>
            </div>
            <div class="col-md-8 col-lg-9">
              <div class="mb-3">
                <label for="appName" class="form-label">{{ $t('apps.app_name') }}</label>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  id="appName"
                  aria-describedby="appNameHelp"
                  v-model="editForm.name"
                  autofocus
                />
                <div id="appNameHelp" class="form-text">{{ $t('apps.app_name_desc') }}</div>
              </div>

              <div class="mb-3 dropdown">
                <label for="appImagePath" class="form-label">Artwork</label>
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control monospace"
                    id="appImagePath"
                    aria-describedby="appImagePathHelp"
                    v-model="editForm['image-path']"
                    @input="editCoverPreview = ''"
                  />
                  <button
                    class="btn btn-outline-secondary dropdown-toggle"
                    type="button"
                    id="findCoverToggle"

<script type="module">
  import { createApp } from 'vue'
  import { initApp } from './init'
  import Navbar from './Navbar.vue'
  import Checkbox from './Checkbox.vue'
  import { Dropdown } from 'bootstrap/dist/js/bootstrap'
  import desktopCover from '../desktop.png'
  import desktopAltCover from '../desktop-alt.png'
  import steamCover from '../steam.png'
  import inputOnlyCover from '../input_only.png'
  import terminateCover from '../terminate.png'
  import virtualDesktopCover from '../virtual_desktop.png'

  const bundledCovers = {
    "desktop.png": desktopCover,
    "desktop-alt.png": desktopAltCover,
    "steam.png": steamCover,
    "input_only.png": inputOnlyCover,
    "terminate.png": terminateCover,
    "virtual_desktop.png": virtualDesktopCover
  }

  const newApp = {
    "name": "New App",
    "output": "",
    "cmd": "",
    "exclude-global-prep-cmd": false,
    "exclude-global-state-cmd": false,
    "elevated": false,
    "auto-detach": true,
    "wait-all": true,
    "exit-timeout": 5,
    "prep-cmd": [],
    "state-cmd": [],
    "detached": [],
    "image-path": "",
    "scale-factor": 100,
    "use-app-identity": false,
    "per-client-app-identity": false,
    "allow-client-commands": true,
    "virtual-display": false,
    "terminate-on-pause": false,
    "gamepad": ""
  }

  const app = createApp({
    components: {
      Navbar,
      Checkbox
    },
    data() {
      return {
        apps: [],
        showEditForm: false,
        actionDisabled: false,
        editForm: null,
        detachedCmd: "",
        coverSearching: false,
        coverFinderBusy: false,
        coverCandidates: [],
        platform: "",
        currentApp: "",
        draggingApp: -1,
        hostName: "",
        hostUUID: "",
        listReordered: false,
        searchQuery: "",
        editCoverPreview: ""
      };
    },
    computed: {
      filteredApps() {
        const query = this.searchQuery.toLocaleLowerCase();
        if (!query) {
          return this.apps;
        }

        return this.apps.filter(app => {
          const name = app.name?.toString().toLocaleLowerCase() || "";
          const command = app.cmd?.toString().toLocaleLowerCase() || "";
          return name.includes(query) || command.includes(query);
        });
      }
    },
    created() {
      this.loadApps();

      fetch("./api/config", {
        credentials: 'include'
      })
        .then(r => r.json())
        .then(r => this.platform = r.platform);
    },
    methods: {
      onDragStart(e, app) {
        if (this.showEditForm || this.searchQuery || this.actionDisabled) {
          e.preventDefault();
          return;
        }

        this.draggingApp = this.apps.indexOf(app);
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", app.uuid);
      },
      onDragEnter(e, app) {
        if (this.draggingApp < 0 || this.apps[this.draggingApp] === app) {
          return;
        }
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        this.apps.forEach(item => item.dragover = false);
        app.dragover = true;
      },
      onDragOver(e) {
        if (this.draggingApp < 0) {
          return;
        }
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
      },
      onDragLeave(app) {
        app.dragover = false;
      },
      onDragEnd() {
        this.apps.forEach(app => app.dragover = false);
        this.draggingApp = -1;
      },
      onDrop(e, app) {
        app.dragover = false;
        if (this.draggingApp < 0) {
          return;
        }
        e.preventDefault();

        const sourceIndex = this.draggingApp;
        let targetIndex = this.apps.indexOf(app);
        if (targetIndex < 0 || targetIndex === sourceIndex || targetIndex - 1 === sourceIndex) {
          this.onDragEnd();
          return;
        }

        const [draggedApp] = this.apps.splice(sourceIndex, 1);

        if (targetIndex > sourceIndex) {
          targetIndex -= 1;
        }

        this.apps.splice(targetIndex, 0, draggedApp);
        this.listReordered = true;
        this.onDragEnd();
      },
      onDropAtEnd(e) {
        if (this.draggingApp < 0) {
          return;
        }
        e.preventDefault();

        const sourceIndex = this.draggingApp;
        if (sourceIndex !== this.apps.length - 1) {
          const [draggedApp] = this.apps.splice(sourceIndex, 1);
          this.apps.push(draggedApp);
          this.listReordered = true;
        }
        this.onDragEnd();
      },
      alphabetizeApps() {
        const originalOrder = this.apps.map(app => app.uuid).join("\n");
        this.apps.sort((a, b) => a.name.localeCompare(b.name));
        this.listReordered = originalOrder !== this.apps.map(app => app.uuid).join("\n");
        if (!this.listReordered) {
          alert(this.$t('apps.already_ordered'));
        }
      },
      saveOrder() {
        this.actionDisabled = true;

        const reorderedUUIDs = this.apps.reduce((reordered, i) => {
          if (i.uuid) {
            reordered.push(i.uuid)
          }
          return reordered
        }, [])

        fetch("./api/apps/reorder", {
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          method: 'POST',
          body: JSON.stringify({order: reorderedUUIDs})
        })
        .then(r => r.json())
        .then((r) => {
          if (!r.status) {
            alert(this.$t("apps.reorder_failed") + r.error);
          }
        })
        .finally(() => {
          return this.loadApps();
        })
        .finally(() => {
          this.actionDisabled = false;
        })

      },
      loadApps() {
        return fetch("./api/apps", {
          credentials: 'include'
        })
        .then(r => r.json())
        .then(r => {
          this.apps = r.apps.filter(i => i.uuid).map(i => ({...i, launching: false, dragover: false}));
          this.currentApp = r.current_app;
          this.hostName = r.host_name;
          this.hostUUID = r.host_uuid;
          this.listReordered = false;
        });
      },
      newApp() {
        this.editForm = JSON.parse(JSON.stringify(newApp));
        this.editCoverPreview = "";
        this.showEditForm = true;
      },
      closeEditor() {
        this.closeCoverFinder();
        this.showEditForm = false;
        this.editForm = null;
        this.editCoverPreview = "";
      },
      launchApp(event, app) {
        if (this.actionDisabled) {
          return;
        }
        const isLocalHost = ['localhost', '127.0.0.1', '[::1]'].indexOf(location.hostname) >= 0

        if (!isLocalHost && confirm(this.$t('apps.launch_local_client'))) {
          const link = document.createElement('a');
          link.href = event.currentTarget.href;
          link.click();
          return;
        }

        if (confirm(this.$t('apps.launch_warning'))) {
          this.actionDisabled = true;
          fetch("./api/apps/launch", {
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            method: 'POST',
            body: JSON.stringify({ uuid: app.uuid })
          })
          .then(r => r.json())
          .then(r => {
            if (!r.status) {
              alert(this.$t('apps.launch_failed') + r.error);
            }
          })
          .finally(() => {
            this.actionDisabled = false;
            this.loadApps()
          });
        }
      },
      closeApp() {
        if (confirm(this.$t('apps.close_warning'))) {
          this.actionDisabled = true;
          fetch("./api/apps/close", {
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            method: 'POST',
          })
          .then((r) => r.json())
          .then((r) => {
            if (!r.status) {
              alert("apps.close_failed")
            }
          })
          .finally(() => {
            this.actionDisabled = false;
            this.loadApps()
          });
        }
      },
      editApp(app) {
        this.editForm = Object.assign(
          JSON.parse(JSON.stringify(newApp)),
          JSON.parse(JSON.stringify(app))
        );
        this.editCoverPreview = this.coverPreviewUrl(app);
        this.showEditForm = true;
      },
      isEnabled(value) {
        if (value === true || value === 1) {
          return true;
        }
        return ["true", "1", "enabled", "enable", "yes", "on"].includes(
          value?.toString().toLowerCase().trim()
        );
      },
      appInitial(app) {
        const name = app?.name?.toString().trim();
        return name ? name.charAt(0).toLocaleUpperCase() : "A";
      },
      appAccent(app) {
        const palette = ["#f8b400", "#ff7a45", "#8b7cf6", "#27b3a2", "#4c8dff", "#e45c92"];
        const name = app?.name?.toString() || "Apollo";
        let hash = 0;
        for (let i = 0; i < name.length; i += 1) {
          hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
        }
        return palette[Math.abs(hash) % palette.length];
      },
      coverPreviewUrl(app) {
        const path = app?.["image-path"]?.toString().trim() || "";
        if (/^(?:https:\/\/|data:image\/|blob:)/i.test(path)) {
          return path;
        }

        const filename = path.replaceAll("\\", "/").split("/").pop()?.toLowerCase();
        return bundledCovers[filename] || "";
      },
      appCommandSummary(app) {
        const command = app?.cmd?.toString().trim();
        if (!command) {
          return "Desktop or no launch command";
        }

        const unquoted = command.replace(/^"([^"]+)".*$/, "$1");
        const parts = unquoted.split(/[\\/]/);
        return parts[parts.length - 1] || command;
      },
      exportLauncherFile(app) {
        const link = document.createElement('a');
        const fileContent = `# Artemis app entry
# Exported by Apollo
# https://github.com/ClassicOldSong/Apollo

[host_uuid] ${this.hostUUID}
[host_name] ${this.hostName}
[app_uuid] ${app.uuid}
[app_name] ${app.name}
`;
        link.href = `data:text/plain;charset=utf-8,${encodeURIComponent(fileContent)}`;
        link.download = `${app.name}.art`;
        link.click();
      },
      showDeleteForm(app) {
        const resp = confirm(
          "Are you sure to delete " + app.name + "?"
        );
        if (resp) {
          this.actionDisabled = true;
          fetch("./api/apps/delete", {
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            method: 'POST',
            body: JSON.stringify({ uuid: app.uuid })
          }).then((r) => r.json())
          .then((r) => {
            if (!r.status) {
              alert("Delete failed! " + r.error);
            }
          })
          .finally(() => {
            this.actionDisabled = false;
            this.loadApps();
          });
        }
      },
      addCmd(cmdArr, idx) {
        const template = {
          do: "",
          undo: ""
        };

        if (this.platform === 'windows') {
          template.elevated = false;
        }

        if (idx < 0) {
          cmdArr.push(template);
        } else {
          cmdArr.splice(idx, 0, template);
        }
      },
      showCoverFinder($event) {
        this.coverCandidates = [];
        this.coverSearching = true;
        const ref = this.$refs.coverFinderDropdown;
        if (!ref) {
          console.error("Ref not found!");
          return;
        }
        this.coverFinderDropdown = Dropdown.getInstance(ref);
        if (!this.coverFinderDropdown) {
          this.coverFinderDropdown = new Dropdown(ref);
          if (!this.coverFinderDropdown) {
            return;
          }
        }
        this.coverFinderDropdown.show();
        function getSearchBucket(name) {
          let bucket = name.substring(0, Math.min(name.length, 2)).toLowerCase().replaceAll(/[^a-z\d]/g, '');
          if (!bucket) {
            return '@';
          }
          return bucket;
        }

        function searchCovers(name) {
          if (!name) {
            return Promise.resolve([]);
          }
          let searchName = name.replaceAll(/\s+/g, '.').toLowerCase();

          // Use raw.githubusercontent.com to avoid CORS issues as we migrate the CNAME
          let dbUrl = "https://raw.githubusercontent.com/LizardByte/GameDB/gh-pages";
          let bucket = getSearchBucket(name);
          return fetch(`${dbUrl}/buckets/${bucket}.json`).then(function (r) {
            if (!r.ok) throw new Error("Failed to search covers");
            return r.json();
          }).then(maps => Promise.all(Object.keys(maps).map(id => {
            let item = maps[id];
            if (item.name.replaceAll(/\s+/g, '.').toLowerCase().startsWith(searchName)) {
              return fetch(`${dbUrl}/games/${id}.json`).then(function (r) {
                return r.json();
              }).catch(() => null);
            }
            return null;
          }).filter(item => item)))
            .then(results => results
              .filter(item => item && item.cover && item.cover.url)
              .map(game => {
                const thumb = game.cover.url;
                const dotIndex = thumb.lastIndexOf('.');
                const slashIndex = thumb.lastIndexOf('/');
                if (dotIndex < 0 || slashIndex < 0) {
                  return null;
                }
                const slug = thumb.substring(slashIndex + 1, dotIndex);
                return {
                  name: game.name,
                  key: `igdb_${game.id}`,
                  url: `https://images.igdb.com/igdb/image/upload/t_cover_big/${slug}.jpg`,
                  saveUrl: `https://images.igdb.com/igdb/image/upload/t_cover_big_2x/${slug}.png`,
                }
              }).filter(item => item));
        }

        searchCovers(this.editForm["name"].toString().trim())
          .then(list => this.coverCandidates = list)
          .catch(() => this.coverCandidates = [])
          .finally(() => this.coverSearching = false);
      },
      closeCoverFinder() {
        const ref = this.$refs.coverFinderDropdown;
        if (!ref) {
          return;
        }
        const dropdown = this.coverFinderDropdown = Dropdown.getInstance(ref);
        if (!dropdown) {
          return;
        }
        dropdown.hide();
      },
      useCover(cover) {
        this.coverFinderBusy = true;
        fetch("./api/covers/upload", {
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          method: 'POST',
          body: JSON.stringify({
            key: cover.key,
            url: cover.saveUrl,
          })
        }).then(r => {
          if (!r.ok) throw new Error("Failed to download covers");
          return r.json();
        }).then(body => {
          this.editForm["image-path"] = body.path;
          this.editCoverPreview = cover.url;
        })
          .then(() => this.closeCoverFinder())
          .finally(() => this.coverFinderBusy = false);
      },
      save() {
        this.editForm.name = this.editForm.name.trim();
        if (!this.editForm.name) {
          return;
        }
        this.editForm["exit-timeout"] = parseInt(this.editForm["exit-timeout"]) || 5
        this.editForm["scale-factor"] = parseInt(this.editForm["scale-factor"]) || 100
        this.editForm["image-path"] = this.editForm["image-path"].toString().trim().replace(/"/g, '');
        delete this.editForm.id;
        delete this.editForm.launching;
        delete this.editForm.dragover;
        this.actionDisabled = true;
        fetch("./api/apps", {
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          method: 'POST',
          body: JSON.stringify(this.editForm),
        }).then((r) => r.json())
        .then((r) => {
          if (!r.status) {
            alert(this.$t('apps.save_failed') + r.error);
            throw new Error(`App save failed: ${r.error}`);
          }
        })
        .then(() => {
          this.showEditForm = false;
          this.editForm = null;
          this.editCoverPreview = "";
          return this.loadApps();
        })
        .finally(() => this.actionDisabled = false);
      },
    },
  });

  app.directive('dropdown-show', {
    mounted: function (el, binding) {
      el.addEventListener('show.bs.dropdown', binding.value);
    }
  });

  initApp(app);
</script>
